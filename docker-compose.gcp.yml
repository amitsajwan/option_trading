services:
  ingestion_app:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/ingestion_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  snapshot_app:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/snapshot_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  persistence_app:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/persistence_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  strategy_persistence_app:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/persistence_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  strategy_app:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/strategy_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  dashboard:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/market_data_dashboard:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always
    ports:
      - "8008:8008"
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      MONGO_HOST: mongo
    volumes:
      - ./.data/ml_pipeline:/app/.data/ml_pipeline:ro
      - ./market_data_dashboard/static:/app/market_data_dashboard/static:ro
      - ./market_data_dashboard/templates:/app/market_data_dashboard/templates:ro

  strategy_eval_orchestrator:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/strategy_eval_orchestrator:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  strategy_eval_ui:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/strategy_eval_ui:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  historical_replay:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/snapshot_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  persistence_app_historical:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/persistence_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  strategy_app_historical:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/strategy_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always

  strategy_persistence_app_historical:
    image: ${GHCR_IMAGE_PREFIX:?set GHCR_IMAGE_PREFIX}/persistence_app:${APP_IMAGE_TAG:?set APP_IMAGE_TAG}
    pull_policy: always
