  .bar-btn.active { border-color: #4a9; color: #4a9; background: #0f201a; }

  .bar-btn.traded { border-color: #363; color: #4c4; }
  .bar-btn.traded.active { background: #0f1a0f; border-color: #4c4; color: #6e6; }

  .layout { display: flex; gap: 0; height: calc(100vh - 120px); }

  .pipeline { width: 400px; flex-shrink: 0; padding: 0 20px; overflow-y: auto; }

  .snapshot-box {
    background: #1a1a2e; border: 1px solid #2a2a4a; padding: 12px;
    margin-bottom: 4px;
  }
  .snapshot-box .label { font-size: 10px; color: #666; letter-spacing: 0.1em; margin-bottom: 6px; }
  .snapshot-box .values { display: flex; gap: 16px; flex-wrap: wrap; }
  .snapshot-box .kv { font-size: 12px; }
  .snapshot-box .kv span { color: #888; }
  .snapshot-box .kv strong { color: #aac; }

  .arrow { text-align: center; color: #444; font-size: 16px; line-height: 20px; }

  .gate {
    border: 1px solid #2a2a2a; background: #141414;
    margin-bottom: 4px; transition: all 0.3s; opacity: 0.3;
  }
  .gate.active { opacity: 1; }
  .gate.pass { border-color: #2a4a2a; background: #0f1a0f; }
  .gate.block { border-color: #4a2a2a; background: #1a0f0f; }
  .gate.skip-c { border-color: #4a3a1a; background: #1a160a; }

  .gate-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; cursor: pointer;
  }
  .gate-name { font-size: 11px; letter-spacing: 0.08em; color: #888; }
  .gate.active .gate-name { color: #ccc; }
  .gate-result {
    font-size: 10px; letter-spacing: 0.1em; padding: 2px 8px;
    font-weight: 700;
  }
  .pass .gate-result { color: #4a9; background: #0a1a10; }
  .block .gate-result { color: #f55; background: #1a0808; }
  .skip-c .gate-result { color: #fa4; background: #1a1000; }
  .pending .gate-result { color: #444; }

  .gate-body { padding: 0 12px 10px; display: none; }
  .gate.active .gate-body { display: block; }
  .gate-reason { font-size: 11px; color: #999; margin-bottom: 6px; line-height: 1.5; }
  .gate-reason strong { color: #f55; }
  .gate-reason.ok strong { color: #4a9; }
  .gate-metrics { display: flex; gap: 12px; flex-wrap: wrap; }
  .metric { font-size: 10px; color: #666; }
  .metric strong { color: #aaa; }
  .metric.bad strong { color: #f66; }
  .metric.good strong { color: #4a9; }
  .metric.warn strong { color: #fa4; }

  .outcome-box {
    margin-top: 8px; padding: 14px; text-align: center;
    border: 1px solid #333; background: #111; opacity: 0.2;
    transition: all 0.4s;
  }
  .outcome-box.show { opacity: 1; }
  .outcome-box.trade { border-color: #4a9; background: #0a1a10; }
  .outcome-box.no-trade { border-color: #733; background: #120808; }
  .outcome-label { font-size: 10px; color: #666; letter-spacing: 0.12em; margin-bottom: 6px; }
  .outcome-main { font-size: 18px; font-weight: 700; }
  .outcome-box.trade .outcome-main { color: #4e9; }
  .outcome-box.no-trade .outcome-main { color: #f44; }
  .outcome-detail { font-size: 11px; color: #888; margin-top: 4px; }
  .outcome-box.trade .outcome-detail { color: #6ab; }

  /* ── Detail panel (right) ────────────────────────────────────────────── */
  .detail { flex: 1; padding: 0 24px; overflow-y: auto; border-left: 1px solid #1e1e1e; }
  .detail-title { font-size: 10px; color: #555; letter-spacing: 0.12em; padding: 4px 0 12px; }

  .context-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .ctx-card { background: #141414; border: 1px solid #222; padding: 12px; }
  .ctx-card-title { font-size: 9px; color: #555; letter-spacing: 0.1em; margin-bottom: 8px; text-transform: uppercase; }

  .ctx-row .v { color: #aaa; }

  .ctx-row .v.bad { color: #f55; font-weight: 700; }
  .ctx-row .v.good { color: #4a9; font-weight: 700; }

  .evidence-bar-label { display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-bottom: 2px; }
  .evidence-bar-track { height: 6px; background: #222; position: relative; }
  .evidence-bar-fill { height: 100%; transition: width 0.4s; }
  .bull-fill { background: #4a9; }
  .bear-fill { background: #f55; }

  .log-section { margin-top: 12px; }
  .log-title { font-size: 9px; color: #555; letter-spacing: 0.1em; margin-bottom: 8px; text-transform: uppercase; }
  .log-line {

  currentBar = BARS.find(b => b.id === id);
  document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.bar-btn').forEach(b => {
    if (b.textContent === currentBar.label) b.classList.add('active');
  });
  renderPipeline(currentBar);
  renderDetail(currentBar);
}

function renderPipeline(bar) {
  // Snapshot
  const snap = bar.snap;
  document.getElementById('snapValues').innerHTML = `
    <div class="kv"><span>time</span> <strong>${snap.time}</strong></div>
    <div class="kv"><span>BNF</span> <strong>${snap.fut.toLocaleString()}</strong></div>
    <div class="kv"><span>regime</span> <strong>${snap.regime}</strong></div>
    <div class="kv"><span>conf</span> <strong>${snap.regimeConf}</strong></div>
    <div class="kv"><span>IV%</span> <strong>${snap.iv}</strong></div>
    <div class="kv"><span>ATM</span> <strong>${snap.atm}</strong></div>
  `;

  // Gates
  const gatesEl = document.getElementById('gates');
  gatesEl.innerHTML = '';
  let blocked = false;
  GATE_STAGES.forEach((stageName, i) => {
    const g = bar.gates.find(g => g.name === stageName);
    const div = document.createElement('div');

    if (blocked) {
      div.className = 'gate';
      div.innerHTML = `
        <div class="gate-header">
          <span class="gate-name">STAGE ${i+2} · ${stageName}</span>
          <span class="gate-result pending">—</span>
        </div>`;
    } else if (!g) {
      // not reached
      div.className = 'gate active pass';
      div.innerHTML = `
        <div class="gate-header">
          <span class="gate-name">STAGE ${i+2} · ${stageName}</span>
          <span class="gate-result">PASS</span>
        </div>
        <div class="gate-body"><div class="gate-reason ok"><strong>Passed</strong></div></div>`;
    } else {
      const cls = g.result === 'pass' ? 'pass' : g.result === 'block' ? 'block' : 'skip-c';
      const resultLabel = g.result === 'pass' ? 'PASS' : g.result === 'block' ? 'BLOCK' : 'SKIP';
      const metricsHtml = g.metrics.map(m =>
        `<div class="metric ${m.cls||''}"><span>${m.k}: </span><strong>${m.v}</strong></div>`
      ).join('');
      div.className = `gate active ${cls}`;
      div.innerHTML = `
        <div class="gate-header">
          <span class="gate-name">STAGE ${i+2} · ${stageName}</span>
          <span class="gate-result">${resultLabel}</span>
        </div>
        <div class="gate-body">
          <div class="gate-reason">${g.reason}</div>
          <div class="gate-metrics">${metricsHtml}</div>
        </div>`;
      if (g.result === 'block') blocked = true;
    }

    // arrow after each gate (except last)
    gatesEl.appendChild(div);
    if (i < GATE_STAGES.length - 1) {
      const arr = document.createElement('div');
      arr.className = 'arrow';
      arr.textContent = blocked ? '·' : '↓';
      gatesEl.appendChild(arr);
    }
  });

  // Outcome
  const ob = document.getElementById('outcomeBox');
  const om = document.getElementById('outcomeMain');
  const od = document.getElementById('outcomeDetail');
  if (bar.outcome === 'traded') {
    ob.className = 'outcome-box show trade';
    om.textContent = 'TRADE TAKEN';
    const r = bar.tradeResult;
    od.innerHTML = `${r.pnl} · MFE ${r.mfe} · ${r.exit} · ${r.lots} lot`;
  } else {
    ob.className = 'outcome-box show no-trade';
    om.textContent = 'NO TRADE';
    const blocker = bar.gates.find(g => g.result === 'block');
    od.textContent = blocker ? `blocked at: ${blocker.name}` : 'filtered';
  }
}

function renderDetail(bar) {
  const ev = bar.evidence;

  // Market context
  const m = bar.market;
  document.getElementById('marketCtx').innerHTML = `
    <div class="ctx-row"><span class="k">r5m</span><span class="v ${ev.r5m > 0 ? 'up' : 'dn'}">${m.r5m}</span></div>
    <div class="ctx-row"><span class="k">r15m</span><span class="v ${ev.r15m > 0 ? 'up' : 'dn'}">${m.r15m}</span></div>
    <div class="ctx-row"><span class="k">r30m</span><span class="v">${m.r30m}</span></div>
    <div class="ctx-row"><span class="k">volume</span><span class="v">${m.volRatio}</span></div>
    <div class="ctx-row"><span class="k">PCR</span><span class="v">${m.pcr}</span></div>
    <div class="ctx-row"><span class="k">ORB</span><span class="v">${m.orb}</span></div>
    <div class="ctx-row"><span class="k">ML_ENTRY prob</span><span class="v ${bar.mlProb >= 0.80 ? 'good' : 'warn'}">${(bar.mlProb*100).toFixed(0)}%</span></div>
    <div class="ctx-row"><span class="k">ML direction</span><span class="v">${bar.mlDir}</span></div>
  `;

  // Evidence scores
  const bullPct = Math.min(100, (ev.bull / 3) * 100);
  const bearPct = Math.min(100, (ev.bear / 3) * 100);
  const bullCls = (bar.mlDir === 'CE' && ev.bull > 0.2) ? 'good' : (bar.mlDir === 'PE' && ev.bull > 0.6) ? 'bad' : '';
  const bearCls = (bar.mlDir === 'PE' && ev.bear > 0.2) ? 'good' : (bar.mlDir === 'CE' && ev.bear > 0.6) ? 'bad' : '';
  document.getElementById('regimeCtx').innerHTML = `
    <div class="evidence-bar-wrap">
      <div class="evidence-bar-label">
        <span class="${bullCls}">bull_score ${ev.bull.toFixed(2)}</span>
        <span style="font-size:9px;color:#555">max 3.0</span>
      </div>
      <div class="evidence-bar-track"><div class="evidence-bar-fill bull-fill" style="width:${bullPct}%"></div></div>
    </div>
    <div class="evidence-bar-wrap" style="margin-top:8px">
      <div class="evidence-bar-label">
        <span class="${bearCls}">bear_score ${ev.bear.toFixed(2)}</span>
        <span style="font-size:9px;color:#555">max 3.0</span>
      </div>
      <div class="evidence-bar-track"><div class="evidence-bar-fill bear-fill" style="width:${bearPct}%"></div></div>
    </div>
    <div style="margin-top:10px">
    <div class="ctx-row"><span class="k">direction proposed</span><span class="v ${
      (bar.mlDir==='PE' && ev.bull>0.6 && ev.bear<0.2) ? 'bad' :
      (bar.mlDir==='CE' && ev.bear>0.6 && ev.bull<0.2) ? 'bad' : 'good'
    }">${bar.mlDir} ${
      (bar.mlDir==='PE' && ev.bull>0.6 && ev.bear<0.2) ? '← against evidence' :
      (bar.mlDir==='CE' && ev.bear>0.6 && ev.bull<0.2) ? '← against evidence' : '← agrees with evidence'
    }</span></div>
    <div class="ctx-row"><span class="k">orh_broken</span><span class="v ${ev.orh?'up':''}">${ev.orh}</span></div>
    <div class="ctx-row"><span class="k">orl_broken</span><span class="v ${ev.orl?'dn':''}">${ev.orl}</span></div>
    </div>
  `;

  // Logs
  document.getElementById('logLines').innerHTML = bar.logs.map(l => `
    <div class="log-line ${l.cls}">
      <span class="ts">${l.ts}</span>
      <span class="tag">${l.tag}</span>
      <span class="msg-${l.cls}"> ${l.msg}</span>
    </div>
  `).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderBarPicker();
selectBar("1230");   // default: show the winning trade
</script>
