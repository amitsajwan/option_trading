<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Strategy Monitor · BANKNIFTY · LIVE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css?v=4" />
<link rel="stylesheet" href="terminal.css?v=4" />
<link rel="stylesheet" href="terminal-mobile.css?v=5" />

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="120" fill="#F6F4EF"/>
    <g stroke="#0B0F14" stroke-width="2" fill="none">
      <path d="M24 78 L38 62 L52 70 L66 48 L80 56 L96 36"/>
    </g>
    <circle cx="96" cy="36" r="4" fill="#0A8F5C"/>
    <rect x="24" y="88" width="72" height="2" fill="#0B0F14" opacity="0.15"/>
    <rect x="24" y="92" width="48" height="2" fill="#0B0F14" opacity="0.10"/>
  </svg>
</template>

<style>
  #app-shell { min-height: 100vh; display: flex; flex-direction: column; background: var(--paper); }
  .topnav {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 20px; border-bottom: 1px solid var(--line-1);
    background: var(--paper); position: sticky; top: 0; z-index: 20;
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px; color: var(--ink);
    font-family: var(--f-mono); letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 20px; height: 20px; border-radius: 4px; background: var(--ink);
    display: grid; place-items: center; color: var(--paper);
    font-family: var(--f-mono); font-size: 11px; font-weight: 700;
  }
  .mode-seg {
    display: inline-flex; background: var(--paper-2); border: 1px solid var(--line-1);
    border-radius: var(--r-3); padding: 3px;
  }
  .mode-seg button {
    background: transparent; border: 0; font: inherit; color: var(--ink-3);
    padding: 5px 12px; border-radius: var(--r-2); cursor: pointer; font-size: 12px;
    font-family: var(--f-mono); letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 5px;
  }
  .mode-seg button.active { background: var(--paper); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .topnav .spacer { flex: 1; }
  .topnav .user {
    display: inline-flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--ink-3); font-family: var(--f-mono);
  }
  .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--pos); box-shadow: 0 0 0 3px var(--pos-wash);
  }
  .loading-shell {
    flex: 1; display: grid; place-items: center; color: var(--ink-3);
    font-family: var(--f-mono); font-size: 12px;
  }
  @media (max-width: 900px) {
    .topnav { padding: 8px 12px; gap: 10px; }
    .topnav .user { display: none; }
    .brand span.long { display: none; }
    .mode-seg button { padding: 4px 8px; font-size: 11px; }
  }

  /* OPS gear — fixed floating launcher, visible in EVERY mode (incl. live-terminal,
     which hides .topnav). Pinned bottom-LEFT: the bottom-right collides with the
     TradingView chart price-axis / TGT-STP labels, which paint over it. z-index
     above the chart so it is never hidden. Accent border so it stands out. */
  .ops-gear-btn {
    position: fixed; left: 18px; bottom: 18px; z-index: 210;
    appearance: none; width: 48px; height: 48px; border-radius: 50%;
    border: 1px solid rgba(90,170,255,0.55);
    background: #1b2330; color: #dfe6f2;
    display: grid; place-items: center; cursor: pointer; font-size: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 0 1px rgba(90,170,255,0.12), 0 0 14px rgba(90,170,255,0.18);
    transition: transform .15s, color .15s, background .15s, box-shadow .15s;
  }
  .ops-gear-btn:hover {
    color: #fff; background: #233044; transform: translateY(-1px) rotate(30deg);
    box-shadow: 0 6px 20px rgba(0,0,0,0.55), 0 0 18px rgba(90,170,255,0.35);
  }
  .ops-gear-btn.active { color: #fff; background: #2a3a52; transform: rotate(90deg); }
  .ops-gear-label {
    position: fixed; left: 74px; bottom: 31px; z-index: 210;
    font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.04em;
    color: #dfe6f2; background: #1b2330; padding: 4px 9px; border-radius: 6px;
    border: 1px solid rgba(90,170,255,0.35); pointer-events: none;
    opacity: 0; transform: translateX(-6px); transition: opacity .15s, transform .15s;
    white-space: nowrap;
  }
  .ops-gear-btn:hover + .ops-gear-label { opacity: 1; transform: translateX(0); }

  .ops-drawer-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0); pointer-events: none;
    transition: background .2s;
  }
  .ops-drawer-overlay.open { background: rgba(0,0,0,0.25); pointer-events: all; }
  .ops-drawer {
    position: absolute; top: 0; right: 0; bottom: 0; width: min(820px, 95vw);
    background: var(--paper); border-left: 1px solid var(--line-1);
    transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .ops-drawer.open { transform: translateX(0); }
  .ops-drawer-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--line-1);
    flex-shrink: 0;
  }
  .ops-drawer-title { font-family: var(--f-mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.04em; color: var(--ink); flex: 1; }
  .ops-drawer-close { appearance: none; border: 0; background: transparent;
    color: var(--ink-3); font-size: 18px; cursor: pointer; padding: 2px 6px;
    border-radius: var(--r-2); line-height: 1; }
  .ops-drawer-close:hover { background: var(--paper-2); color: var(--ink); }
  .ops-drawer-body { flex: 1; overflow-y: auto; }

  /* Tweaks-panel-specific  */
  .kill-banner {
    background: var(--neg-wash); color: var(--neg); border: 1px solid rgba(194,62,47,0.3);
    border-radius: var(--r-3); padding: 10px 14px; margin: 0 16px 10px; display: flex;
    align-items: center; gap: 10px; font-size: 12px;
  }
  .kill-banner strong { color: var(--neg); }
</style>
</head>
<body>

<div id="app-shell">
  <nav class="topnav">
    <div class="brand">
      <span class="brand-mark">Q</span>
      <span class="long">Quiet Operator</span>
    </div>
    <div id="mode-segment" class="mode-seg">
      <button data-mode="live"><span class="status-dot"></span> Live</button>
      <button data-mode="replay">◷ Replay</button>
      <button data-mode="eval">⚗ Eval</button>
      <button data-mode="pipeline">⬡ Pipeline</button>
    </div>
    <div class="spacer"></div>
    <span id="kill-indicator" class="chip" style="display:none"><span class="dot"></span>Engine halted</span>
    <span class="user mobile-hide"><span class="status-dot"></span>ops · amitsajwan</span>
  </nav>

  <!-- OPS launcher — fixed floating, outside topnav so it survives live-terminal mode -->
  <button id="ops-gear-btn" class="ops-gear-btn" title="Daily Ops — simulate & configure">⚙</button>
  <span class="ops-gear-label">Daily Ops</span>

  <div id="kill-banner-slot"></div>

  <!-- OPS drawer — rendered by React, toggled by the ⚙ gear button -->
  <div id="ops-drawer-overlay" class="ops-drawer-overlay">
    <div id="ops-drawer" class="ops-drawer">
      <div class="ops-drawer-header">
        <span class="ops-drawer-title">⚙ Daily Ops</span>
        <button class="ops-drawer-close" id="ops-drawer-close">✕</button>
      </div>
      <div class="ops-drawer-body" id="ops-drawer-body">
        <!-- OpsPage mounts here -->
      </div>
    </div>
  </div>

  <main id="page" class="page">
    <div class="loading-shell">loading…</div>
  </main>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/echarts@5.5.1/dist/echarts.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="core.js?v=6"></script>
<script type="text/babel" src="components.jsx?v=12"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=5"></script>
<script type="text/babel" src="terminal-live.jsx?v=32"></script>
<script type="text/babel" src="eval.jsx?v=16"></script>
<script type="text/babel" src="pipeline.jsx?v=2"></script>
<script type="text/babel" src="ops.jsx?v=1"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  // Persisted tweak defaults
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "mode": "live",
    "density": "compact",
    "speedPreset": 8,
    "replayAuto": true,
    "evalDefaultDataset": "historical",
    "evalChartHeight": 240,
    "evalAutoRun": true,
    "evalFeatureExpanded": false,
    "evalPreset": ""
  }/*EDITMODE-END*/;

  function App() {
    const initialParams = new URLSearchParams(window.location.search);
    const initialMode = initialParams.get('mode') || (initialParams.get('tab') === 'evaluation' ? 'eval' : '') || TWEAK_DEFAULTS.mode || 'live';
    const evalPresetParam = (initialParams.get('preset') || '').trim().toLowerCase();
    const bootTweaks = {
      ...TWEAK_DEFAULTS,
      ...(evalPresetParam === 'r1s_top3' || evalPresetParam === 'r1s' ? { evalPreset: 'r1s_top3' } : {}),
    };
    const [mode, setMode] = useState(initialMode);
    const [killed, setKilled] = useState(false);
    const [confirmOpen, setConfirmOpen] = useState(false);
    const [tweaks, setTweaks] = useState(bootTweaks);

    async function refreshHaltState() {
      try {
        const res = await fetch('/api/operator/halt', { method: 'GET' });
        if (!res.ok) throw new Error(`server returned ${res.status}`);
        const payload = await res.json();
        setKilled(Boolean(payload.halted));
      } catch (err) {
        console.error('halt status request failed:', err);
      }
    }

    async function onResumeClick() {
      try {
        const res = await fetch('/api/operator/halt', { method: 'DELETE' });
        if (!res.ok) throw new Error(`server returned ${res.status}`);
        setKilled(false);
      } catch (err) {
        console.error('halt resume request failed:', err);
      }
    }

    useEffect(() => {
      refreshHaltState();
    }, []);

    // Sync body classes synchronously during render so charts see the right
    // class when their createChart useEffect fires (children mount after parent renders).
    // live + replay → cockpit shell (live-terminal); eval → dark panel layout (app-dark)
    document.body.classList.toggle('live-terminal', mode === 'live' || mode === 'replay');
    document.body.classList.toggle('app-dark', mode === 'eval' || mode === 'pipeline');

    useEffect(() => {
      // Sync mode buttons
      document.querySelectorAll('#mode-segment button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
        btn.onclick = () => setMode(btn.dataset.mode);
      });
    }, [mode]);

    // Sync URL and page title with current mode.
    // When switching to LIVE the URL is cleaned (removes stale replay params).
    useEffect(() => {
      const modeLabels = { live: 'LIVE', replay: 'REPLAY', eval: 'EVAL', pipeline: 'PIPELINE' };
      document.title = `Strategy Monitor · BANKNIFTY · ${modeLabels[mode] || mode.toUpperCase()}`;
      if (mode === 'live') {
        // Clear any leftover replay/sim query params
        window.history.replaceState({}, '', window.location.pathname);
      }
    }, [mode]);

    useEffect(() => {
      const ind = document.getElementById('kill-indicator');
      if (ind) ind.style.display = killed ? 'inline-flex' : 'none';
      const slot = document.getElementById('kill-banner-slot');
      if (!slot) return;
      if (killed) {
        slot.innerHTML = '<div class="kill-banner">' +
          '<strong>Engine halted.</strong> New signals are rejected. ' +
          '<button class="btn sm" style="margin-left:auto">Resume…</button>' +
          '</div>';
        const resumeBtn = slot.querySelector('button');
        if (resumeBtn) resumeBtn.onclick = onResumeClick;
      } else {
        slot.innerHTML = '';
      }
    }, [killed]);

    // ── OPS drawer ──────────────────────────────────────────────────────────
    // OpsPage is mounted lazily on first open so Babel has time to compile
    // ops.jsx before we try to use window.OpsPage.
    useEffect(() => {
      const overlay  = document.getElementById('ops-drawer-overlay');
      const drawer   = document.getElementById('ops-drawer');
      const gearBtn  = document.getElementById('ops-gear-btn');
      const closeBtn = document.getElementById('ops-drawer-close');
      if (!overlay || !drawer || !gearBtn) return;

      let mounted = false;

      const openDrawer = () => {
        // Mount OpsPage the first time the drawer is opened
        if (!mounted) {
          const body = document.getElementById('ops-drawer-body');
          if (body && window.OpsPage) {
            ReactDOM.createRoot(body).render(React.createElement(window.OpsPage));
            mounted = true;
          } else {
            body.innerHTML = '<div style="padding:20px;font-family:monospace;font-size:12px;color:#888">Loading ops module…</div>';
            // Retry once after 500ms in case Babel hasn't finished
            setTimeout(() => {
              if (!mounted && body && window.OpsPage) {
                body.innerHTML = '';
                ReactDOM.createRoot(body).render(React.createElement(window.OpsPage));
                mounted = true;
              }
            }, 500);
          }
        }
        overlay.classList.add('open');
        drawer.classList.add('open');
        gearBtn.classList.add('active');
      };

      const closeDrawer = () => {
        overlay.classList.remove('open');
        drawer.classList.remove('open');
        gearBtn.classList.remove('active');
      };

      const toggle = () => overlay.classList.contains('open') ? closeDrawer() : openDrawer();

      gearBtn.onclick    = toggle;
      if (closeBtn) closeBtn.onclick = closeDrawer;
      overlay.onclick    = (e) => { if (e.target === overlay) closeDrawer(); };

      return () => { gearBtn.onclick = null; };
    }, []);
    // ────────────────────────────────────────────────────────────────────────

    // Tweaks are managed by TweaksPanel itself (protocol + open state).
    // We only need to track mode/density/etc. state here.

    function updateTweak(patch) {
      setTweaks(prev => {
        const next = { ...prev, ...patch };
        try {
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
        } catch (err) {}
        return next;
      });
      if (patch.mode) setMode(patch.mode);
    }

    // apply density to body class
    useEffect(() => {
      document.body.dataset.density = tweaks.density || 'comfortable';
    }, [tweaks.density]);

    const onKillClick = () => setConfirmOpen(true);
    const onConfirmKill = async () => {
      try {
        const res = await fetch('/api/operator/halt', { method: 'POST' });
        if (!res.ok) throw new Error(`server returned ${res.status}`);
        setKilled(true);
      } catch (err) {
        console.error('halt request failed:', err);
      }
      setConfirmOpen(false);
    };

    const monitorEl = mode === 'live'
      ? <LiveMonitorDark onModeSwitch={(m) => setMode(typeof m === 'string' ? m : 'replay')} onKillClick={onKillClick} />
      : mode === 'replay'
        ? <ReplayMonitorDark onModeSwitch={setMode} />
        : mode === 'pipeline'
          ? <PipelineMonitor />
          : <EvalMonitor tweaks={tweaks} />;

    return (
      <>
        {monitorEl}
        <ConfirmModal
          open={confirmOpen}
          title="Halt engine?"
          message="This prevents the engine from acting on new signals. Open positions remain until manually closed or stop-out. Type HALT to confirm."
          confirmText="Halt engine"
          requireType="HALT"
          danger
          onCancel={() => setConfirmOpen(false)}
          onConfirm={onConfirmKill}
        />
        <TweaksPanel title="Tweaks">
            <TweakSection label="Mode">
              <TweakRadio
                label="View"
                value={tweaks.mode}
                options={[{ value: 'live', label: 'Live' }, { value: 'replay', label: 'Replay' }, { value: 'eval', label: 'Eval' }]}
                onChange={v => updateTweak({ mode: v })}
              />
            </TweakSection>
            {mode === 'eval' && (
              <TweakSection label="Eval">
                <TweakRadio
                  label="Default dataset"
                  value={tweaks.evalDefaultDataset}
                  options={[{ value: 'historical', label: 'Historical' }, { value: 'live', label: 'Live' }]}
                  onChange={v => updateTweak({ evalDefaultDataset: v })}
                />
                <TweakSlider
                  label="Chart height"
                  value={tweaks.evalChartHeight} min={220} max={520} step={10} unit="px"
                  onChange={v => updateTweak({ evalChartHeight: v })}
                />
                <TweakToggle label="Auto-run on load" value={tweaks.evalAutoRun}
                  onChange={v => updateTweak({ evalAutoRun: v })} />
                <TweakToggle label="Feature panel expanded" value={tweaks.evalFeatureExpanded}
                  onChange={v => updateTweak({ evalFeatureExpanded: v })} />
              </TweakSection>
            )}
            <TweakSection label="Layout">
              <TweakRadio
                label="Density"
                value={tweaks.density}
                options={[
                  { value: 'compact', label: 'Compact' },
                  { value: 'comfortable', label: 'Comfortable' },
                ]}
                onChange={v => updateTweak({ density: v })}
              />
            </TweakSection>
            {mode === 'replay' && (
              <TweakSection label="Replay">
                <TweakRadio
                  label="Default speed"
                  value={String(tweaks.speedPreset)}
                  options={['1', '2', '4', '8', '16'].map(s => ({ value: s, label: s + '×' }))}
                  onChange={v => updateTweak({ speedPreset: Number(v) })}
                />
                <TweakToggle label="Auto-play on load" value={tweaks.replayAuto}
                  onChange={v => updateTweak({ replayAuto: v })} />
              </TweakSection>
            )}
          </TweaksPanel>
      </>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('page'));
  root.render(<App />);
</script>

</body>
</html>
