<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Data - Simple View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <div class="bg-white rounded-lg shadow p-6 mb-4">
            <h1 class="text-2xl font-bold mb-2">Market Data Dashboard - Fast View</h1>
            <div class="text-sm text-gray-600">
                Status: <span id="status" class="font-semibold">Loading...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- OHLC Data Card -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold mb-4">OHLC Data (BANKNIFTY26FEBFUT)</h2>
                <div id="ohlc-container" class="space-y-2">
                    <div class="text-gray-500">Loading...</div>
                </div>
            </div>

            <!-- Chart Card -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold mb-4">Price Chart</h2>
                <!-- Fixed-height wrapper prevents Chart.js responsive resize loops causing endless page growth -->
                <div class="relative" style="height: 260px;">
                    <canvas id="priceChart" class="w-full h-full"></canvas>
                </div>
            </div>

            <!-- Redis Info Card -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold mb-4">Redis Status</h2>
                <div id="redis-info" class="space-y-2">
                    <div class="text-gray-500">Checking...</div>
                </div>
            </div>

            <!-- LTP Card -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold mb-4">Last Traded Price</h2>
                <div id="ltp-container" class="space-y-2">
                    <div class="text-gray-500">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const symbol = 'BANKNIFTY26FEBFUT';
        let chart = null;

        async function loadRedisData() {
            document.getElementById('status').textContent = 'Connected ✓';
            document.getElementById('status').className = 'font-semibold text-green-600';

            // Load OHLC data directly from market data API
            try {
                const response = await fetch('http://localhost:8004/api/v1/market/ohlc/' + symbol + '?timeframe=minute&limit=50');
                const data = await response.json();
                displayOHLC(data);
                updateChart(data);
            } catch (error) {
                console.error('OHLC error:', error);
                document.getElementById('ohlc-container').innerHTML = 
                    `<div class="text-red-600">Error loading OHLC: ${error.message}</div>`;
            }

            // Load Redis stats - commented out since API doesn't have this endpoint
            // try {
            //     const response = await fetch('/api/simple/redis-stats');
            //     const data = await response.json();
            //     displayRedisInfo(data);
            // } catch (error) {
            //     console.error('Redis error:', error);
            //     document.getElementById('redis-info').innerHTML = 
            //         `<div class="text-red-600">Error: ${error.message}</div>`;
            // }

            // Load LTP
            try {
                const response = await fetch('http://localhost:8004/api/v1/market/tick/' + symbol);
                const data = await response.json();
                displayLTP(data);
            } catch (error) {
                console.error('LTP error:', error);
                document.getElementById('ltp-container').innerHTML = 
                    `<div class="text-red-600">Error: ${error.message}</div>`;
            }
        }

        function displayOHLC(data) {
            const container = document.getElementById('ohlc-container');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="text-yellow-600">No OHLC data found. Checked keys:<br><code class="text-xs">live:ohlc_sorted:*<br>ohlc_sorted:*<br>ohlc:*</code></div>';
                return;
            }

            const latest = data[data.length - 1];
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <div class="text-sm text-gray-600">Open</div>
                        <div class="text-lg font-semibold">₹${latest.open.toLocaleString()}</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-600">High</div>
                        <div class="text-lg font-semibold text-green-600">₹${latest.high.toLocaleString()}</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-600">Low</div>
                        <div class="text-lg font-semibold text-red-600">₹${latest.low.toLocaleString()}</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-600">Close</div>
                        <div class="text-lg font-semibold">₹${latest.close.toLocaleString()}</div>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t">
                    <div class="text-sm text-gray-600">Volume: ${latest.volume.toLocaleString()}</div>
                    <div class="text-xs text-gray-500 mt-2">Total bars: ${data.length}</div>
                    <div class="text-xs text-gray-500">Latest: ${(latest.start_at || latest.timestamp) ? (() => {
                        const date = new Date(latest.start_at || latest.timestamp);
                        return isNaN(date.getTime()) ? 'Invalid Date: ' + (latest.start_at || latest.timestamp) : date.toLocaleString();
                    })() : 'N/A'}</div>
                </div>
            `;
        }

        function displayRedisInfo(data) {
            const container = document.getElementById('redis-info');
            container.innerHTML = `
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Connection:</span>
                        <span class="font-semibold text-green-600">${data.connected ? 'Connected' : 'Disconnected'}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Total Keys:</span>
                        <span class="font-semibold">${data.total_keys || 0}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">OHLC Keys:</span>
                        <span class="font-semibold">${data.ohlc_keys || 0}</span>
                    </div>
                    <div class="mt-4 text-xs text-gray-500">
                        ${data.server || 'localhost:6379'}
                    </div>
                </div>
            `;
        }

        function displayLTP(data) {
            const container = document.getElementById('ltp-container');
            if (!data || !data.last_price) {
                container.innerHTML = '<div class="text-yellow-600">No LTP data</div>';
                return;
            }

            container.innerHTML = `
                <div class="text-3xl font-bold text-blue-600">
                    ₹${data.last_price.toLocaleString()}
                </div>
                <div class="text-sm text-gray-600 mt-2">
                    Volume: ${data.volume?.toLocaleString() || 'N/A'}
                </div>
                <div class="text-xs text-gray-500 mt-1">
                    ${data.timestamp || 'No timestamp'}
                </div>
            `;
        }

        function updateChart(data) {
            if (!data || data.length === 0) return;

            const canvas = document.getElementById('priceChart');
            const last20 = data.slice(-20);
            const labels = last20.map((_, i) => i + 1);
            const values = last20.map(d => d.close);

            // Create once, then update in-place to avoid reflows/resizes that can grow the page.
            if (!chart) {
                chart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Close Price',
                            data: values,
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        resizeDelay: 200,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            x: {
                                display: false,
                            },
                            y: {
                                beginAtZero: false
                            }
                        }
                    }
                });
            } else {
                chart.data.labels = labels;
                chart.data.datasets[0].data = values;
                chart.update('none');
            }
        }

        // Load data on page load
        loadRedisData();

        // Refresh every 10 seconds
        setInterval(loadRedisData, 10000);
    </script>
</body>
</html>
