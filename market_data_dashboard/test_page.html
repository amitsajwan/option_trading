<!DOCTYPE html>
<html>
<head>
    <title>Market Data Test Page</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #1e1e1e; color: #fff; }
        .card { background: #2d2d2d; padding: 20px; margin: 20px 0; border-radius: 8px; border: 1px solid #444; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .data { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; }
        h1 { color: #4CAF50; }
        h2 { color: #2196F3; margin-top: 0; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 14px; }
        .status.ok { background: #4CAF50; }
        .status.fail { background: #f44336; }
    </style>
</head>
<body>
    <h1>🔧 Market Data System Test</h1>
    
    <div class="card">
        <h2>1. Redis Connection</h2>
        <div id="redis-status">Testing...</div>
    </div>
    
    <div class="card">
        <h2>2. Last Traded Price (LTP)</h2>
        <div id="ltp-data">Loading...</div>
    </div>
    
    <div class="card">
        <h2>3. OHLC Candle Data</h2>
        <div id="ohlc-data">Loading...</div>
    </div>
    
    <div class="card">
        <h2>4. Dashboard Status Endpoint</h2>
        <div id="status-data">Loading...</div>
    </div>

    <script>
        const SYMBOL = 'BANKNIFTY26FEBFUT';
        
        // Test Redis via custom endpoint
        fetch('/test/redis')
            .then(r => r.json())
            .then(data => {
                document.getElementById('redis-status').innerHTML = `
                    <span class="status ${data.connected ? 'ok' : 'fail'}">
                        ${data.connected ? '✓ Connected' : '✗ Failed'}
                    </span>
                    <div class="data">${JSON.stringify(data, null, 2)}</div>
                `;
            })
            .catch(e => {
                document.getElementById('redis-status').innerHTML = 
                    `<span class="status fail">✗ Error: ${e.message}</span>`;
            });
        
        // Test LTP
        fetch(`/test/ltp/${SYMBOL}`)
            .then(r => r.json())
            .then(data => {
                if (data.last_price) {
                    document.getElementById('ltp-data').innerHTML = `
                        <span class="status ok">✓ Data Found</span>
                        <h3 style="color: #4CAF50; font-size: 32px; margin: 10px 0;">
                            ₹${data.last_price.toLocaleString('en-IN', {minimumFractionDigits: 2})}
                        </h3>
                        <div class="data">${JSON.stringify(data, null, 2)}</div>
                    `;
                } else {
                    document.getElementById('ltp-data').innerHTML = 
                        `<span class="status fail">✗ No Data</span>`;
                }
            })
            .catch(e => {
                document.getElementById('ltp-data').innerHTML = 
                    `<span class="status fail">✗ Error: ${e.message}</span>`;
            });
        
        // Test OHLC
        fetch(`/test/ohlc/${SYMBOL}`)
            .then(r => r.json())
            .then(data => {
                if (data.bars && data.bars.length > 0) {
                    const latest = data.bars[data.bars.length - 1];
                    document.getElementById('ohlc-data').innerHTML = `
                        <span class="status ok">✓ ${data.bars.length} Candles</span>
                        <h4>Latest 5-min Candle:</h4>
                        <div class="data">${JSON.stringify(latest, null, 2)}</div>
                    `;
                } else {
                    document.getElementById('ohlc-data').innerHTML = 
                        `<span class="status fail">✗ No Candles</span>`;
                }
            })
            .catch(e => {
                document.getElementById('ohlc-data').innerHTML = 
                    `<span class="status fail">✗ Error: ${e.message}</span>`;
            });
        
        // Test Status
        fetch('/api/market-data/status')
            .then(r => r.json())
            .then(data => {
                document.getElementById('status-data').innerHTML = `
                    <span class="status ${data.ltp ? 'ok' : 'fail'}">
                        ${data.ltp ? '✓ Working' : '⚠ Limited Data'}
                    </span>
                    <div class="data">${JSON.stringify(data, null, 2)}</div>
                `;
            })
            .catch(e => {
                document.getElementById('status-data').innerHTML = 
                    `<span class="status fail">✗ Error: ${e.message}</span>`;
            });
    </script>
</body>
</html>
