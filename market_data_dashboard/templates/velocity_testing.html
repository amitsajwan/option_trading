<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Policy Testing</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #f2f6f3;
            --bg1: #ddebe5;
            --card: #ffffff;
            --ink: #152129;
            --muted: #61717d;
            --line: #d5dee5;
            --accent: #0d6b57;
            --accent2: #1f5d86;
            --good: #0f9d7a;
            --bad: #bf4b36;
            --warn: #c37b19;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: "Space Grotesk", sans-serif;
            background: linear-gradient(170deg, var(--bg0), var(--bg1));
            min-height: 100vh;
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(23, 35, 49, 0.07);
            padding: 20px;
            margin-bottom: 16px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hero h1 {
            margin: 0;
            font-size: 28px;
            color: var(--ink);
        }

        .hero-desc {
            margin-top: 6px;
            color: var(--muted);
            font-size: 14px;
            max-width: 600px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .control-group input,
        .control-group select {
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            background: white;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(13, 107, 87, 0.1);
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        button {
            padding: 10px 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            opacity: 0.9;
            box-shadow: 0 4px 12px rgba(13, 107, 87, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-secondary {
            background: var(--bg1);
            color: var(--ink);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--ink);
        }

        .stat-value.good { color: var(--good); }
        .stat-value.bad { color: var(--bad); }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .results-table th {
            border-bottom: 2px solid var(--line);
            padding: 10px 8px;
            text-align: left;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            font-size: 11px;
        }

        .results-table td {
            border-bottom: 1px solid var(--line);
            padding: 10px 8px;
        }

        .results-table tr:hover {
            background: var(--bg0);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }

        .status-badge.allowed {
            background: rgba(15, 157, 122, 0.1);
            color: var(--good);
        }

        .status-badge.blocked {
            background: rgba(191, 75, 54, 0.1);
            color: var(--bad);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--muted);
        }

        .error {
            padding: 12px;
            background: rgba(191, 75, 54, 0.05);
            border: 1px solid rgba(191, 75, 54, 0.2);
            border-radius: 8px;
            color: var(--bad);
            margin-top: 12px;
        }

        .chart-container {
            height: 300px;
            margin-top: 16px;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="panel hero">
        <div>
            <h1>Velocity Policy Testing</h1>
            <p class="hero-desc">
                Test velocity-enhanced Regime Classifier and Entry Policy over any date range.
                Evaluate performance of morning momentum and IV quality gates.
            </p>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin-top: 0;">Test Configuration</h2>
        
        <div class="controls">
            <div class="control-group">
                <label>From Date</label>
                <input type="date" id="dateFrom" />
            </div>
            <div class="control-group">
                <label>To Date</label>
                <input type="date" id="dateTo" />
            </div>
            <div class="control-group">
                <label>Direction Filter</label>
                <select id="tradeDirection">
                    <option value="">All</option>
                    <option value="CE">CE (Calls)</option>
                    <option value="PE">PE (Puts)</option>
                </select>
            </div>
        </div>

        <div class="buttons">
            <button id="testBtn" onclick="runVelocityTest()">Run Test</button>
            <button id="heatmapBtn" class="button-secondary" onclick="generateHeatmap()">Show Heatmap</button>
        </div>
    </div>

    <div id="resultsPanel" style="display:none;" class="panel">
        <h2>Test Results</h2>
        
        <div id="stats" class="stats-grid"></div>
        
        <div id="resultsContent"></div>
        
        <div id="chartContainer" class="chart-container" style="display:none;"></div>
    </div>

    <div id="errorPanel" style="display:none;" class="error"></div>
</div>

<script>
    // Set default date range (last 7 days)
    const today = new Date();
    const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
    
    document.getElementById('dateTo').valueAsDate = today;
    document.getElementById('dateFrom').valueAsDate = weekAgo;

    async function runVelocityTest() {
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;
        const direction = document.getElementById('tradeDirection').value;
        
        if (!dateFrom || !dateTo) {
            showError('Please select both date range');
            return;
        }

        const btn = document.getElementById('testBtn');
        btn.disabled = true;
        btn.textContent = 'Testing...';
        
        document.getElementById('errorPanel').style.display = 'none';

        try {
            const params = new URLSearchParams();
            params.append('date_from', dateFrom);
            params.append('date_to', dateTo);
            if (direction) params.append('trade_direction', direction);

            const response = await fetch(`/api/trading/velocity-testing/test?${params}`);
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Test failed');
            }

            const result = await response.json();
            displayResults(result);
        } catch (error) {
            showError(`Error: ${error.message}`);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Run Test';
        }
    }

    function displayResults(result) {
        const resultsPanel = document.getElementById('resultsPanel');
        const statsDiv = document.getElementById('stats');
        const resultsContent = document.getElementById('resultsContent');

        // Display stats
        const stats = result.statistics || {};
        statsDiv.innerHTML = `
            <div class="stat-card">
                <div class="stat-label">Total Snapshots</div>
                <div class="stat-value">${stats.total_snapshots_with_velocity || 0}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Entries Allowed</div>
                <div class="stat-value good">${stats.entries_allowed || 0}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Entries Blocked</div>
                <div class="stat-value bad">${stats.entries_blocked || 0}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Allow Rate</div>
                <div class="stat-value">${stats.allow_rate_pct || 0}%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Regime Conf</div>
                <div class="stat-value">${stats.avg_regime_confidence?.toFixed(2) || 0}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Morning Momentum</div>
                <div class="stat-value good">${stats.morning_momentum_passed || 0}</div>
            </div>
        `;

        // Display results table
        const results = result.results || [];
        let tableHTML = `
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Regime</th>
                        <th>Regime Conf</th>
                        <th>Entry</th>
                        <th>Score</th>
                        <th>Gates</th>
                    </tr>
                </thead>
                <tbody>
        `;

        results.slice(-20).forEach(r => {
            const allowanceClass = r.entry_allowed ? 'allowed' : 'blocked';
            const allowanceText = r.entry_allowed ? 'ALLOWED' : 'BLOCKED';
            const checks = r.checks || {};
            const checksSummary = Object.keys(checks).slice(0, 2).join(', ');
            
            tableHTML += `
                <tr>
                    <td>${r.timestamp}</td>
                    <td>${r.regime}</td>
                    <td>${r.regime_confidence}</td>
                    <td><span class="status-badge ${allowanceClass}">${allowanceText}</span></td>
                    <td>${r.entry_score}</td>
                    <td><small>${checksSummary}</small></td>
                </tr>
            `;
        });

        tableHTML += '</tbody></table>';
        resultsContent.innerHTML = tableHTML;

        resultsPanel.style.display = 'block';
    }

    async function generateHeatmap() {
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;

        if (!dateFrom || !dateTo) {
            showError('Please select both date range');
            return;
        }

        const btn = document.getElementById('heatmapBtn');
        btn.disabled = true;
        btn.textContent = 'Loading...';

        try {
            const params = new URLSearchParams();
            params.append('date_from', dateFrom);
            params.append('date_to', dateTo);

            const response = await fetch(`/api/trading/velocity-testing/heatmap?${params}`);
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Heatmap generation failed');
            }

            const result = await response.json();
            displayHeatmap(result);
        } catch (error) {
            showError(`Error: ${error.message}`);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Show Heatmap';
        }
    }

    function displayHeatmap(data) {
        const chart = echarts.init(document.getElementById('chartContainer'));
        const dist = data.distributions || {};
        
        const option = {
            title: { text: 'Velocity Metrics Distribution' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['Price Delta', 'Vol Spike'] },
            xAxis: { type: 'category' },
            yAxis: { type: 'value' },
            series: [
                {
                    name: 'Price Delta Open',
                    data: [
                        dist.price_delta_open?.mean || 0,
                        dist.price_delta_open?.std || 0,
                    ],
                    type: 'bar',
                    smooth: true,
                },
                {
                    name: 'Vol Spike Ratio',
                    data: [
                        dist.vol_spike_ratio?.mean || 0,
                        dist.vol_spike_ratio?.std || 0,
                    ],
                    type: 'bar',
                    smooth: true,
                },
            ],
        };
        
        chart.setOption(option);
        document.getElementById('chartContainer').style.display = 'block';
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorPanel');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }
</script>
</body>
</html>
