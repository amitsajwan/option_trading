      - ./.run:/app/.run
      - ./.data/ml_pipeline:/app/.data/ml_pipeline:ro
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro
      - ./ml_pipeline_2/artifacts:/app/ml_pipeline_2/artifacts:ro

  # Spawned per-run by SIM orchestrator alongside strategy_app_sim:
  #   docker compose run --rm -d -e SIM_RUN_ID=<rid> strategy_persistence_sim
  # Consumes per-run SIM streams (votes/signals/positions/decision_trace) and
  # writes to the *_sim mongo collections for the REPLAY UI.
  strategy_persistence_sim:
    profiles: ["sim"]
    build:
      context: .
      dockerfile: persistence_app/Dockerfile
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      SIM_RUN_ID: "${SIM_RUN_ID:-sim_run_id_required}"
      MONGO_COLL_STRATEGY_VOTES: "${MONGO_COLL_STRATEGY_VOTES_SIM:-strategy_votes_sim}"
      MONGO_COLL_TRADE_SIGNALS: "${MONGO_COLL_TRADE_SIGNALS_SIM:-trade_signals_sim}"
      MONGO_COLL_STRATEGY_POSITIONS: "${MONGO_COLL_STRATEGY_POSITIONS_SIM:-strategy_positions_sim}"
      MONGO_COLL_STRATEGY_DECISION_TRACES: "${MONGO_COLL_STRATEGY_DECISION_TRACES_SIM:-strategy_decision_traces_sim}"
      MARKET_SESSION_ENABLED: "0"
      MARKET_TIMEZONE: "${MARKET_TIMEZONE:-Asia/Kolkata}"
      MARKET_OPEN_TIME: "${MARKET_OPEN_TIME:-09:15}"
      MARKET_CLOSE_TIME: "${MARKET_CLOSE_TIME:-15:30}"
      NSE_HOLIDAYS_FILE: "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}"
    command:
      ["python", "-m", "persistence_app.main_strategy_stream_consumer", "--health-log-interval-sec", "30"]
    volumes:
      - ./.run:/app/.run
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro

  # Re-enabled 2026-05-16 after Stage 3 hardening landed (commit bb36eef): decoupled
  # writer thread, bounded queue, pubsub recovery on error, env-configurable mongo
  # timeouts (default 30s socket, was 5s). Replay no longer triggers silent hang.
  # Per ARCHITECTURE.md §9 target architecture, this consumer now serves as a load
  # test for the live persistence path — same code, exercised under the heavier
  # replay event rate before live trading needs it.
  strategy_persistence_app_historical:
    profiles: ["historical"]
    build:
      context: .
      dockerfile: persistence_app/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      strategy_app_historical:
        condition: service_started
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      MARKET_SESSION_ENABLED: "0"
      MARKET_TIMEZONE: "${MARKET_TIMEZONE:-Asia/Kolkata}"
      MARKET_OPEN_TIME: "${MARKET_OPEN_TIME:-09:15}"
      MARKET_CLOSE_TIME: "${MARKET_CLOSE_TIME:-15:30}"
      NSE_HOLIDAYS_FILE: "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}"
      STRATEGY_VOTE_TOPIC: "${STRATEGY_VOTE_TOPIC_HISTORICAL:-market:strategy:votes:v1:historical}"
      TRADE_SIGNAL_TOPIC: "${TRADE_SIGNAL_TOPIC_HISTORICAL:-market:strategy:signals:v1:historical}"
      STRATEGY_POSITION_TOPIC: "${STRATEGY_POSITION_TOPIC_HISTORICAL:-market:strategy:positions:v1:historical}"
      STRATEGY_DECISION_TRACE_TOPIC: "${STRATEGY_DECISION_TRACE_TOPIC_HISTORICAL:-market:strategy:decision_trace:v1:historical}"
      MONGO_COLL_STRATEGY_VOTES: "${MONGO_COLL_STRATEGY_VOTES_HISTORICAL:-strategy_votes_historical}"
      MONGO_COLL_TRADE_SIGNALS: "${MONGO_COLL_TRADE_SIGNALS_HISTORICAL:-trade_signals_historical}"
      MONGO_COLL_STRATEGY_POSITIONS: "${MONGO_COLL_STRATEGY_POSITIONS_HISTORICAL:-strategy_positions_historical}"
      MONGO_COLL_STRATEGY_DECISION_TRACES: "${MONGO_COLL_STRATEGY_DECISION_TRACES_HISTORICAL:-strategy_decision_traces_historical}"
    command:
      [
        "python",
        "-m",
        "persistence_app.main_strategy_consumer",
        "--foreground",
        "--vote-topic",
        "${STRATEGY_VOTE_TOPIC_HISTORICAL:-market:strategy:votes:v1:historical}",
        "--signal-topic",
        "${TRADE_SIGNAL_TOPIC_HISTORICAL:-market:strategy:signals:v1:historical}",
        "--position-topic",
        "${STRATEGY_POSITION_TOPIC_HISTORICAL:-market:strategy:positions:v1:historical}",
        "--trace-topic",
        "${STRATEGY_DECISION_TRACE_TOPIC_HISTORICAL:-market:strategy:decision_trace:v1:historical}",
      ]
    volumes:
      - ./.run:/app/.run
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-m",
          "persistence_app.strategy_health",
          "--max-age-seconds",
          "300",
        ]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  mongo_data:
