services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --client-output-buffer-limit "normal 0 0 0 slave 268435456 67108864 60 pubsub 0 0 0"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingestion_app:
    build:
      context: .
      dockerfile: ingestion_app/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      INSTRUMENT_SYMBOL: "${INSTRUMENT_SYMBOL:-BANKNIFTY26MARFUT}"
      KITE_CREDENTIALS_PATH: "${KITE_CREDENTIALS_PATH:-/app/secrets/credentials.json}"
      MARKET_SESSION_ENABLED: "${MARKET_SESSION_ENABLED:-1}"
      MARKET_TIMEZONE: "${MARKET_TIMEZONE:-Asia/Kolkata}"
      MARKET_OPEN_TIME: "${MARKET_OPEN_TIME:-09:15}"
      MARKET_CLOSE_TIME: "${MARKET_CLOSE_TIME:-15:30}"
      NSE_HOLIDAYS_FILE: "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}"
      IDLE_SLEEP_SECONDS: "${IDLE_SLEEP_SECONDS:-60}"
      INGESTION_COLLECTORS_ENABLED: "${INGESTION_COLLECTORS_ENABLED:-0}"
      LIVE_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
      HISTORICAL_TOPIC: "${HISTORICAL_TOPIC:-market:snapshot:v1:historical}"
      SNAPSHOT_V1_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
    command:
      [
        "python",
        "-m",
        "ingestion_app.market_session_runner",
        "--mode",
        "live",
        "--holidays-file",
        "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}",
        "--idle-sleep-seconds",
        "${IDLE_SLEEP_SECONDS:-60}",
        "--state-file",
        "/app/.run/ingestion_app/session_state.json",
      ]
    volumes:
      - ./.run:/app/.run
      - ./ingestion_app/credentials.json:/app/secrets/credentials.json:ro
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro
    ports:
      - "${INGESTION_API_PORT:-8004}:8004"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-m",
          "ingestion_app.market_session_runner",
          "--healthcheck",
          "--state-file",
          "/app/.run/ingestion_app/session_state.json",
          "--max-stale-seconds",
          "240",
        ]
      interval: 60s
      timeout: 15s
      retries: 3

  snapshot_app:
    build:
      context: .
      dockerfile: snapshot_app/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      ingestion_app:
        condition: service_healthy
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      INSTRUMENT_SYMBOL: "${INSTRUMENT_SYMBOL:-BANKNIFTY26MARFUT}"
      KITE_CREDENTIALS_PATH: "${KITE_CREDENTIALS_PATH:-/app/secrets/credentials.json}"
      MARKET_SESSION_ENABLED: "${MARKET_SESSION_ENABLED:-1}"
      MARKET_TIMEZONE: "${MARKET_TIMEZONE:-Asia/Kolkata}"
      MARKET_OPEN_TIME: "${MARKET_OPEN_TIME:-09:15}"
      MARKET_CLOSE_TIME: "${MARKET_CLOSE_TIME:-15:30}"
      NSE_HOLIDAYS_FILE: "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}"
      IDLE_SLEEP_SECONDS: "${IDLE_SLEEP_SECONDS:-60}"
      LIVE_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
      HISTORICAL_TOPIC: "${HISTORICAL_TOPIC:-market:snapshot:v1:historical}"
      SNAPSHOT_V1_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
      ML_PIPELINE_DISABLE_KITE_BACKFILL: "${ML_PIPELINE_DISABLE_KITE_BACKFILL:-1}"
      CROSS_ASSET_ENABLED: "${CROSS_ASSET_ENABLED:-0}"
      NIFTY_FUT_SYMBOL: "${NIFTY_FUT_SYMBOL:-NFO:NIFTY26JUNFUT}"
      BLOCK_TRADE_MIN_LOTS: "${BLOCK_TRADE_MIN_LOTS:-5}"
    command:
      [
        "python",
        "-m",
        "snapshot_app.main_live",
        "--foreground",
        "--instrument",
        "${INSTRUMENT_SYMBOL:-BANKNIFTY26MARFUT}",
        "--market-api-base",
        "http://ingestion_app:8004",
        "--dashboard-api-base",
        "${SNAPSHOT_DASHBOARD_API_BASE:-}",
        "--out-jsonl",
        "/app/.run/snapshot_app/events.jsonl",
      ]
    volumes:
      - ./.run:/app/.run
      - ./ingestion_app/credentials.json:/app/secrets/credentials.json:ro
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-m",
          "snapshot_app.health",
          "--events-path",
          "/app/.run/snapshot_app/events.jsonl",
          "--max-age-seconds",
          "300",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  persistence_app:
    build:
      context: .
      dockerfile: persistence_app/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      snapshot_app:
        condition: service_healthy
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      MONGO_COLL_SNAPSHOTS: "${MONGO_COLL_SNAPSHOTS:-phase1_market_snapshots}"
      MARKET_SESSION_ENABLED: "${MARKET_SESSION_ENABLED:-1}"
      MARKET_TIMEZONE: "${MARKET_TIMEZONE:-Asia/Kolkata}"
      MARKET_OPEN_TIME: "${MARKET_OPEN_TIME:-09:15}"
      MARKET_CLOSE_TIME: "${MARKET_CLOSE_TIME:-15:30}"
      NSE_HOLIDAYS_FILE: "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}"
      LIVE_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
      HISTORICAL_TOPIC: "${HISTORICAL_TOPIC:-market:snapshot:v1:historical}"
      SNAPSHOT_V1_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
    command:
      [
        "python",
        "-m",
        "persistence_app.main_snapshot_consumer",
        "--foreground",
        "--event-topic",
        "${LIVE_TOPIC:-market:snapshot:v1}",
      ]
    volumes:
      - ./.run:/app/.run
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-m",
          "persistence_app.health",
          "--max-age-seconds",
          "300",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  strategy_persistence_app:
    build:
      context: .
      dockerfile: persistence_app/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      strategy_app:
        condition: service_started
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      STRATEGY_VOTE_TOPIC: "${STRATEGY_VOTE_TOPIC:-market:strategy:votes:v1}"
      TRADE_SIGNAL_TOPIC: "${TRADE_SIGNAL_TOPIC:-market:strategy:signals:v1}"
      STRATEGY_POSITION_TOPIC: "${STRATEGY_POSITION_TOPIC:-market:strategy:positions:v1}"
      STRATEGY_DECISION_TRACE_TOPIC: "${STRATEGY_DECISION_TRACE_TOPIC:-market:strategy:decision_trace:v1}"
      MONGO_COLL_STRATEGY_VOTES: "${MONGO_COLL_STRATEGY_VOTES:-strategy_votes}"
      MONGO_COLL_TRADE_SIGNALS: "${MONGO_COLL_TRADE_SIGNALS:-trade_signals}"
      MONGO_COLL_STRATEGY_POSITIONS: "${MONGO_COLL_STRATEGY_POSITIONS:-strategy_positions}"
      MONGO_COLL_STRATEGY_DECISION_TRACES: "${MONGO_COLL_STRATEGY_DECISION_TRACES:-strategy_decision_traces}"
      MARKET_SESSION_ENABLED: "${MARKET_SESSION_ENABLED:-1}"
      MARKET_TIMEZONE: "${MARKET_TIMEZONE:-Asia/Kolkata}"
      MARKET_OPEN_TIME: "${MARKET_OPEN_TIME:-09:15}"
      MARKET_CLOSE_TIME: "${MARKET_CLOSE_TIME:-15:30}"
      NSE_HOLIDAYS_FILE: "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}"
    command:
      [
        "python",
        "-m",
        "persistence_app.main_strategy_consumer",
        "--foreground",
        "--vote-topic",
        "${STRATEGY_VOTE_TOPIC:-market:strategy:votes:v1}",
        "--signal-topic",
        "${TRADE_SIGNAL_TOPIC:-market:strategy:signals:v1}",
        "--position-topic",
        "${STRATEGY_POSITION_TOPIC:-market:strategy:positions:v1}",
        "--trace-topic",
        "${STRATEGY_DECISION_TRACE_TOPIC:-market:strategy:decision_trace:v1}",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-m",
          "persistence_app.strategy_health",
          "--max-age-seconds",
          "300",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - ./.run:/app/.run
      - ./.data/ml_pipeline:/app/.data/ml_pipeline:ro
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro

  strategy_app:
    build:
      context: .
      dockerfile: strategy_app/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      snapshot_app:
        condition: service_healthy
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      STRATEGY_RUN_DIR: "/app/.run/strategy_app"
      MARKET_SESSION_ENABLED: "${MARKET_SESSION_ENABLED:-1}"
      MARKET_TIMEZONE: "${MARKET_TIMEZONE:-Asia/Kolkata}"
      MARKET_OPEN_TIME: "${MARKET_OPEN_TIME:-09:15}"
      MARKET_CLOSE_TIME: "${MARKET_CLOSE_TIME:-15:30}"
      NSE_HOLIDAYS_FILE: "${NSE_HOLIDAYS_FILE:-/app/config/nse_holidays.json}"
      STRATEGY_REDIS_PUBLISH_ENABLED: "${STRATEGY_REDIS_PUBLISH_ENABLED:-1}"
      STRATEGY_VOTE_TOPIC: "${STRATEGY_VOTE_TOPIC:-market:strategy:votes:v1}"
      TRADE_SIGNAL_TOPIC: "${TRADE_SIGNAL_TOPIC:-market:strategy:signals:v1}"
      STRATEGY_POSITION_TOPIC: "${STRATEGY_POSITION_TOPIC:-market:strategy:positions:v1}"
      STRATEGY_DECISION_TRACE_TOPIC: "${STRATEGY_DECISION_TRACE_TOPIC:-market:strategy:decision_trace:v1}"
      LIVE_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
      HISTORICAL_TOPIC: "${HISTORICAL_TOPIC:-market:snapshot:v1:historical}"
      SNAPSHOT_V1_TOPIC: "${LIVE_TOPIC:-market:snapshot:v1}"
      ML_PIPELINE_2_REPO_ROOT: "/app"
      ML_PURE_RUN_ID: "${ML_PURE_RUN_ID:-}"
      ML_PURE_MODEL_GROUP: "${ML_PURE_MODEL_GROUP:-}"
      ML_PURE_MODEL_PACKAGE: "${ML_PURE_MODEL_PACKAGE:-}"
      ML_PURE_THRESHOLD_REPORT: "${ML_PURE_THRESHOLD_REPORT:-}"
      STRATEGY_ML_PURE_BYPASS_GATES: "${STRATEGY_ML_PURE_BYPASS_GATES:-0}"
      STRATEGY_ML_PURE_RANDOMIZE_DIRECTION: "${STRATEGY_ML_PURE_RANDOMIZE_DIRECTION:-0}"
      STRATEGY_SMART_STRIKE_ENABLED: "${STRATEGY_SMART_STRIKE_ENABLED:-0}"
      SMART_STRIKE_IV_REJECT_PCTILE: "${SMART_STRIKE_IV_REJECT_PCTILE:-}"
      SMART_STRIKE_OTM_CONFIDENCE: "${SMART_STRIKE_OTM_CONFIDENCE:-}"
      SMART_STRIKE_OTM_IV_CEIL: "${SMART_STRIKE_OTM_IV_CEIL:-}"
      SMART_STRIKE_OTM2_ENABLED: "${SMART_STRIKE_OTM2_ENABLED:-0}"
      SMART_STRIKE_OTM2_CONFIDENCE: "${SMART_STRIKE_OTM2_CONFIDENCE:-}"
      SMART_STRIKE_OTM2_IV_CEIL: "${SMART_STRIKE_OTM2_IV_CEIL:-}"
      SMART_STRIKE_OTM2_REGIMES: "${SMART_STRIKE_OTM2_REGIMES:-}"
      SMART_STRIKE_OTM2_MAX_BAR_HOUR: "${SMART_STRIKE_OTM2_MAX_BAR_HOUR:-}"
      ML_PURE_UNDERLYING_STOP_PCT: "${ML_PURE_UNDERLYING_STOP_PCT:-}"
      ML_PURE_UNDERLYING_TARGET_PCT: "${ML_PURE_UNDERLYING_TARGET_PCT:-}"
      ML_PURE_POST_STOP_COOLDOWN_BARS: "${ML_PURE_POST_STOP_COOLDOWN_BARS:-0}"
      OPTION_PNL_MODEL_BUNDLE: "${OPTION_PNL_MODEL_BUNDLE:-/app/ml_pipeline_2/artifacts/option_pnl_bundles/option_pnl_atm_pe_9_20260518_063221/option_pnl_atm_pe_9_20260518_063304,/app/ml_pipeline_2/artifacts/option_pnl_bundles/option_pnl_atm_ce_9_20260518_063305/option_pnl_atm_ce_9_20260518_063335}"
      OPTION_PNL_RISK_BREACH_COOLDOWN_BARS: "${OPTION_PNL_RISK_BREACH_COOLDOWN_BARS:-5}"
      ML_PURE_MAX_FEATURE_AGE_SEC: "${ML_PURE_MAX_FEATURE_AGE_SEC:-90}"
      STRATEGY_ENHANCED_VELOCITY: "${STRATEGY_ENHANCED_VELOCITY:-0}"
      STRATEGY_IV_EXTREME_PERCENTILE: "${STRATEGY_IV_EXTREME_PERCENTILE:-95.0}"
      RISK_PROFILE: "${RISK_PROFILE:-}"
      RISK_LOT_SIZING_MODE: "${RISK_LOT_SIZING_MODE:-risk_based}"
      RISK_NOTIONAL_PER_TRADE: "${RISK_NOTIONAL_PER_TRADE:-0}"
      RISK_LOT_BUDGET_USES_LOT_SIZE: "${RISK_LOT_BUDGET_USES_LOT_SIZE:-1}"
      RISK_MAX_DAILY_LOSS_PCT: "${RISK_MAX_DAILY_LOSS_PCT:-0.02}"
      RISK_MAX_CONSECUTIVE_LOSSES: "${RISK_MAX_CONSECUTIVE_LOSSES:-3}"
      RISK_MAX_SESSION_TRADES: "${RISK_MAX_SESSION_TRADES:-6}"
      RISK_MAX_LOTS_PER_TRADE: "${RISK_MAX_LOTS_PER_TRADE:-5}"
      RISK_PER_TRADE_PCT: "${RISK_PER_TRADE_PCT:-0.005}"
      RISK_CAPITAL_ALLOCATED: "${RISK_CAPITAL_ALLOCATED:-500000}"
      RISK_VIX_HALT_THRESHOLD: "${RISK_VIX_HALT_THRESHOLD:-15}"
      RISK_VIX_RESUME_THRESHOLD: "${RISK_VIX_RESUME_THRESHOLD:-8}"
      STRATEGY_STARTUP_WARMUP_MINUTES: "${STRATEGY_STARTUP_WARMUP_MINUTES:-0}"
      STRATEGY_STARTUP_WARMUP_EVENTS: "${STRATEGY_STARTUP_WARMUP_EVENTS:-0}"
      STRATEGY_STRIKE_SELECTION_POLICY: "${STRATEGY_STRIKE_SELECTION_POLICY:-atm}"
      STRATEGY_STRIKE_MAX_OTM_STEPS: "${STRATEGY_STRIKE_MAX_OTM_STEPS:-2}"
      STRATEGY_STRIKE_MIN_OI: "${STRATEGY_STRIKE_MIN_OI:-50000}"
      STRATEGY_STRIKE_MIN_VOLUME: "${STRATEGY_STRIKE_MIN_VOLUME:-15000}"
      STRATEGY_STRIKE_LIQUIDITY_WEIGHT: "${STRATEGY_STRIKE_LIQUIDITY_WEIGHT:-1.0}"
      STRATEGY_STRIKE_AFFORDABILITY_WEIGHT: "${STRATEGY_STRIKE_AFFORDABILITY_WEIGHT:-0.25}"
      STRATEGY_STRIKE_DISTANCE_PENALTY: "${STRATEGY_STRIKE_DISTANCE_PENALTY:-0.05}"
      STRATEGY_PROFILE_ID: "${STRATEGY_PROFILE_ID:-}"
      STRATEGY_PREMIUM_STOP_LOSS_PCT: "${STRATEGY_PREMIUM_STOP_LOSS_PCT:-}"
      ENTRY_ML_MODEL_PATH: "${ENTRY_ML_MODEL_PATH:-}"
      ENTRY_ML_MIN_PROB: "${ENTRY_ML_MIN_PROB:-0.55}"
      ML_ENTRY_PE_ONLY: "${ML_ENTRY_PE_ONLY:-0}"
      ML_ENTRY_BLOCK_CE: "${ML_ENTRY_BLOCK_CE:-0}"
      ML_ENTRY_CE_ONLY: "${ML_ENTRY_CE_ONLY:-0}"
      ML_ENTRY_BLOCK_PE: "${ML_ENTRY_BLOCK_PE:-0}"
      ENTRY_TIME_WINDOWS: "${ENTRY_TIME_WINDOWS:-}"
      ENTRY_REGIME_TAGGER: "${ENTRY_REGIME_TAGGER:-}"
      ENTRY_REGIME_ALLOWED_TAGS: "${ENTRY_REGIME_ALLOWED_TAGS:-}"
      DIRECTION_ML_MODEL_PATH: "${DIRECTION_ML_MODEL_PATH:-}"
      DIRECTION_ML_WEIGHT: "${DIRECTION_ML_WEIGHT:-0.40}"
      DIRECTION_ML_FILTER_MIN_PROB: "${DIRECTION_ML_FILTER_MIN_PROB:-}"
      BRAIN_ENABLED: "${BRAIN_ENABLED:-true}"
      BRAIN_DAILY_FEATURES_PATH: "${BRAIN_DAILY_FEATURES_PATH:-/app/.data/ml_pipeline/daily_regime_features.json}"
      BRAIN_CONSENSUS_MIN_AGREEING: "${BRAIN_CONSENSUS_MIN_AGREEING:-1}"
      BRAIN_CONSENSUS_REQUIRE_DIRECTION: "${BRAIN_CONSENSUS_REQUIRE_DIRECTION:-false}"
      ML_ENTRY_DET_SKIP_BRAIN_GATE: "${ML_ENTRY_DET_SKIP_BRAIN_GATE:-false}"
      DEPTH_FEED_ENABLED: "${DEPTH_FEED_ENABLED:-0}"
      DEPTH_STALE_SEC: "${DEPTH_STALE_SEC:-30}"
    command:
      [
        "python",
        "-m",
        "strategy_app.main",
        "--engine",
        "${STRATEGY_ENGINE:-ml_pure}",
        "--min-confidence",
        "${STRATEGY_MIN_CONFIDENCE:-0.65}",
        "--strategy-profile-id",
        "${STRATEGY_PROFILE_ID:-}",
        "--topic",
        "${LIVE_TOPIC:-market:snapshot:v1}",
        "--rollout-stage",
        "${STRATEGY_ROLLOUT_STAGE:-capped_live}",
        "--position-size-multiplier",
        "${STRATEGY_POSITION_SIZE_MULTIPLIER:-1.0}",
        "--ml-runtime-guard-file",
        "${STRATEGY_ML_RUNTIME_GUARD_FILE:-}",
        "--ml-pure-run-id",
        "${ML_PURE_RUN_ID:-}",
        "--ml-pure-model-group",
        "${ML_PURE_MODEL_GROUP:-}",
        "--ml-pure-model-package",
        "${ML_PURE_MODEL_PACKAGE:-}",
        "--ml-pure-threshold-report",
        "${ML_PURE_THRESHOLD_REPORT:-}",
      ]
    volumes:
      - ./.run:/app/.run
      - ./.data/ml_pipeline:/app/.data/ml_pipeline:ro
      - ./config/nse_holidays.json:/app/config/nse_holidays.json:ro
      - ./ml_pipeline_2/artifacts:/app/ml_pipeline_2/artifacts:ro
    healthcheck:
      test: ["CMD", "python", "-m", "strategy_app.health"]
      interval: 60s
      timeout: 10s
      retries: 3

  depth_collector:
    # Live-only side-channel: polls Kite REST API for ATM CE/PE order book depth
    # and writes best-bid/ask to Redis for strategy_app to read as a live signal.
    # Operator runbook — ATM strike rotation:
    #   1. Identify the new ATM CE/PE symbols from the chain (e.g. NFO:BANKNIFTY24OCT50000CE)
    #   2. Update DEPTH_FEED_INSTRUMENTS in your .env or compose override
    #   3. docker compose --profile live up -d --no-deps depth_collector
    #      (rolling restart — Redis keys expire via TTL if collector stops)
    # Enable: add --profile live to docker compose up, set DEPTH_FEED_ENABLED=1
    # on strategy_app, and set DEPTH_FEED_INSTRUMENTS to the ATM symbols.
    profiles: ["live"]
    build:
      context: .
      dockerfile: ingestion_app/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      EXECUTION_MODE: "live"
      KITE_API_KEY: "${KITE_API_KEY:-}"
      KITE_ACCESS_TOKEN: "${KITE_ACCESS_TOKEN:-}"
      DEPTH_FEED_INSTRUMENTS: "${DEPTH_FEED_INSTRUMENTS:-}"
      DEPTH_POLL_INTERVAL_SEC: "${DEPTH_POLL_INTERVAL_SEC:-5}"
      DEPTH_STALE_TTL_SEC: "${DEPTH_STALE_TTL_SEC:-60}"
      DEPTH_MARKET_OPEN_IST: "${DEPTH_MARKET_OPEN_IST:-09:15}"
      DEPTH_MARKET_CLOSE_IST: "${DEPTH_MARKET_CLOSE_IST:-15:35}"
      DEPTH_MONGO_ENABLED: "${DEPTH_MONGO_ENABLED:-1}"
      DEPTH_MONGO_TTL_DAYS: "${DEPTH_MONGO_TTL_DAYS:-7}"
    command: ["python", "-m", "ingestion_app.collectors.depth_collector"]

  dashboard:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: market_data_dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      TZ: "Asia/Kolkata"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "${REDIS_DB:-0}"
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: "${MONGO_DB:-trading_ai}"
      MONGO_COLL_STRATEGY_VOTES: "${MONGO_COLL_STRATEGY_VOTES:-strategy_votes}"
      MONGO_COLL_TRADE_SIGNALS: "${MONGO_COLL_TRADE_SIGNALS:-trade_signals}"
      MONGO_COLL_STRATEGY_POSITIONS: "${MONGO_COLL_STRATEGY_POSITIONS:-strategy_positions}"
      MONGO_COLL_STRATEGY_VOTES_HISTORICAL: "${MONGO_COLL_STRATEGY_VOTES_HISTORICAL:-strategy_votes_historical}"
      MONGO_COLL_TRADE_SIGNALS_HISTORICAL: "${MONGO_COLL_TRADE_SIGNALS_HISTORICAL:-trade_signals_historical}"
      MONGO_COLL_STRATEGY_POSITIONS_HISTORICAL: "${MONGO_COLL_STRATEGY_POSITIONS_HISTORICAL:-strategy_positions_historical}"
      MONGO_COLL_STRATEGY_EVAL_RUNS: "${MONGO_COLL_STRATEGY_EVAL_RUNS:-strategy_eval_runs}"
