name: Build and push images

on:
  push:
    branches: [main, chore/ml-pipeline-ubuntu-gcp-runbook]
    tags: ["v*"]
  pull_request:
    branches: [main]   # build only, no push on PRs

permissions:
  contents: read
  packages: write      # required to push to ghcr.io

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect which services changed
        id: detect
        run: |
          ALL_SERVICES=(
            ingestion_app
            snapshot_app
            persistence_app
            strategy_app
            market_data_dashboard
            strategy_eval_orchestrator
            strategy_eval_ui
          )

          # On a version tag or first commit — rebuild everything
          BASE="${{ github.event.before }}"
          IS_TAG="${{ github.ref_type == 'tag' }}"

          if [ "${IS_TAG}" = "true" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED="ALL"
          else
            CHANGED=$(git diff --name-only "${BASE}" HEAD 2>/dev/null || echo "ALL")
          fi

          SERVICES=()
          for svc in "${ALL_SERVICES[@]}"; do
            # Rebuild if the service directory changed, or shared contracts changed,
            # or pyproject/requirements changed at root
            if [ "${CHANGED}" = "ALL" ] \
              || echo "${CHANGED}" | grep -qE "^${svc}/" \
              || echo "${CHANGED}" | grep -qE "^contracts_app/" \
              || echo "${CHANGED}" | grep -qE "^(pyproject\.toml|requirements.*\.txt|setup\.py|setup\.cfg)$"; then
              SERVICES+=("${svc}")
            fi
          done

          # contracts_app change = everything rebuilds
          if echo "${CHANGED}" | grep -qE "^contracts_app/"; then
            SERVICES=("${ALL_SERVICES[@]}")
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -sc .)
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"service\":${JSON}}" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: ${{ matrix.service }}
    runs-on: ubuntu-22.04
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    strategy:
      fail-fast: false    # one service failing does not cancel others
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}"
          SERVICE="${{ matrix.service }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"

          TAGS="${REPO}/${SERVICE}:${SHORT_SHA}"

          DEFAULT_BRANCHES="main chore/ml-pipeline-ubuntu-gcp-runbook"
          if [ "${EVENT}" = "push" ]; then
            if [ "${REF_TYPE}" = "branch" ] && echo "${DEFAULT_BRANCHES}" | grep -qw "${REF_NAME}"; then
              TAGS="${TAGS},${REPO}/${SERVICE}:latest"
            fi
            if [ "${REF_TYPE}" = "tag" ]; then
              TAGS="${TAGS},${REPO}/${SERVICE}:${REF_NAME}"
            fi
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Built tags: ${TAGS}"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}